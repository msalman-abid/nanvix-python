name: Nanvix CI

on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [ cpython-release ]
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "nanvix/**" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  ci:
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v1.12.0
    with:
      zutil-version: "v0.7.26"
      platforms: "[\"microvm\"]"
      process-modes: "[\"standalone\"]"
      memory-sizes: "[\"256mb\"]"
      caller-event-name: ${{ github.event_name }}
      release-notes-extra: |
        CPython 3.12.3 distribution for Nanvix with pure Python pip packages.
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      DISPATCH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

  windows-release:
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    env:
      NANVIX_MACHINE: microvm
      NANVIX_DEPLOYMENT_MODE: standalone
      NANVIX_MEMORY_SIZE: 256mb
      NANVIX_VERSION: ${{ needs.ci.outputs.nanvix_tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Install nanvix-zutil
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NANVIX_ZUTIL_VERSION: "v0.7.26"
        shell: pwsh
        run: |
          $jq = '.assets[] | select(.name | endswith(".whl")) | .browser_download_url'
          $wheel = gh api "repos/nanvix/zutils/releases/tags/$env:NANVIX_ZUTIL_VERSION" --jq $jq
          python -m pip install $wheel

      - name: Setup
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: nanvix-zutil setup

      - name: Build
        shell: pwsh
        run: nanvix-zutil build

      - name: Release
        shell: pwsh
        run: nanvix-zutil release

      - name: Upload Windows release asset
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ needs.ci.outputs.package_version }}-nanvix-${{ needs.ci.outputs.nanvix_version }}"
          $asset = Get-ChildItem dist/*.zip -ErrorAction Stop
          gh release upload $tag $asset.FullName --clobber
