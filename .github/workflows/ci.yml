name: Nanvix CI

on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [cpython-release]
  push:
    branches: ["main", "nanvix/**"]
  pull_request:
    branches: ["main", "nanvix/**"]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  ci:
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v1.2.0
    with:
      zutil-version: "v0.4.2"
      platforms: '["microvm"]'
      process-modes: '["multi-process", "single-process"]'
      memory-sizes: '["128mb"]'
      caller-event-name: ${{ github.event_name }}
      release-notes-extra: |
        CPython 3.12.3 distribution for Nanvix with 8 statically linked C extensions
        and 108 pip packages.
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
